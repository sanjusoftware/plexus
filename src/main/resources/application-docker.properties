# Redis Configuration for Session Store
REDIS_HOST=redis
REDIS_PORT=6379

# Database Configuration
SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/bankengine
SPRING_DATASOURCE_USERNAME=user
SPRING_DATASOURCE_PASSWORD=password

# --- Local Development Defaults ---
app.security.system-bank-id=SYSTEM
app.security.system-issuer=http://identity-provider:9090/default

# Provider-Agnostic OIDC Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://identity-provider:9090/default

# Custom properties for Swagger UI OAuth2 flow
swagger.auth-url=http://identity-provider:9090/default/authorize
swagger.token-url=http://identity-provider:9090/default/token

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Drools storage path
drools.rule-path=/tmp/drools-rules

# --- Logging Configuration ---
# General Debugging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG
logging.level.com.bankengine=DEBUG

# SUPPRESS Health Check Noise
# These filters are responsible for the "Securing GET /actuator/health" logs
logging.level.org.springframework.security.web.FilterChainProxy=INFO
logging.level.org.springframework.security.web.authentication.AnonymousAuthenticationFilter=INFO