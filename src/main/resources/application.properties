server.port=8080
server.max-http-header-size=16384
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.data.web.pageable.serialization-mode=via-dto

# --- System Onboarding Configuration ---
# Used only to seed the first 'Owner' of the platform
app.security.system-bank-id=${APP_SECURITY_SYSTEM_BANK_ID:SYSTEM}
# Local default: Mock OAuth. Azure/Prod: Injected via CI/CD
app.security.system-issuer=${APP_SECURITY_SYSTEM_ISSUER:http://identity-provider:9090/default}
app.security.system-bank-name=${APP_SECURITY_SYSTEM_BANK_NAME:Plexus System Bank}
app.security.system-bank-admin-name=${APP_SECURITY_SYSTEM_BANK_ADMIN_NAME:System Admin}
app.security.system-bank-admin-email=${APP_SECURITY_SYSTEM_BANK_ADMIN_EMAIL:admin@plexus.app}
app.security.system-bank-admin-currency-code=${APP_SECURITY_SYSTEM_BANK_CURRENCY_CODE:USD}

# --- OIDC / JWT Configuration ---
# Use /organizations/ for Entra ID multi-tenancy, or specific realm for Keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:http://identity-provider:9090/default}

# --- Swagger / OpenAPI Configuration ---
# Injected via GitHub Secrets for Cloud; defaults to mock for Local
springdoc.swagger-ui.oauth.client-id=${CLIENT_ID:bank-engine-api}
swagger.api-scope=${SWAGGER_API_SCOPE:read}
swagger.auth-url=${SWAGGER_AUTH_URL:http://identity-provider:9090/default/authorize}
swagger.token-url=${SWAGGER_TOKEN_URL:http://identity-provider:9090/default/token}

springdoc.swagger-ui.oauth.scopes=${swagger.api-scope},openid,profile,offline_access
springdoc.swagger-ui.oauth.use-pkce-with-authorization-code-grant=true
springdoc.swagger-ui.csrf.enabled=true

# --- Session & Redis Management ---
# Azure Staging: Set to 'none'. Local/Prod: Set to 'redis'
spring.session.store-type=${SPRING_SESSION_STORE_TYPE:none}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.repositories.enabled=${SPRING_DATA_REDIS_REPOSITORIES_ENABLED:false}

spring.session.redis.namespace=bank-engine
spring.session.timeout=30m

# Cache Management
app.redis.clear-system-caches-on-startup=${APP_REDIS_CLEAR_SYSTEM_CACHES_ON_STARTUP:true}
app.redis.system-cache-patterns=${APP_REDIS_SYSTEM_CACHE_PATTERNS:systemAuthorities::*,rolePermissions::*}

# --- Persistence ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# --- Monitoring & Actuator ---
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.health.db.enabled=true

# --- Logging ---
logging.level.com.bankengine=DEBUG
logging.level.org.springframework.security=INFO
# Reduce noise from session repository
logging.level.org.springframework.security.web.context.HttpSessionSecurityContextRepository=INFO