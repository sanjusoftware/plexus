# --- Database ---
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# --- REDIS DISABLE (The "Nuclear" Option) ---
# 1. Disable Spring Session Redis (Use standard Servlet containers)
spring.session.store-type=none

# 2. Disable Redis Caching (Use ConcurrentHashMap)
spring.cache.type=simple

# 3. Disable Redis Repositories
spring.data.redis.repositories.enabled=false

# 4. Explicitly exclude Redis Autoconfiguration to prevent ANY bean creation
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
org.springframework.boot.autoconfigure.session.SessionAutoConfiguration

# --- Security / OIDC ---
# Dummy URI to prevent startup discovery calls
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9090/jwks
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://plexus-bankengine.com/auth

# --- App Logic ---
app.security.system-bank-id=SYSTEM
app.seed.enabled=false
spring.sql.init.mode=never