name: CD - Azure Deployment

on:
  workflow_run:
    workflows: ["CI Build"]
    types: [completed]

jobs:
  deploy-staging:
    # Only run if the CI Build actually succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: Staging
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Run Flyway Migration
        run: ./gradlew flywayMigrate
        env:
          SPRING_DATASOURCE_URL: ${{ secrets.STAGING_SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.STAGING_SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.STAGING_SPRING_DATASOURCE_PASSWORD }}

      - name: Deploy to Staging Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'bank-engine-api'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          # Note: We use the SHA from the triggering workflow
          images: '${{ secrets.ACR_LOGIN_SERVER }}/plexus-bankengine:${{ github.event.workflow_run.head_sha }}'

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: Production
    steps:
      - name: Deploy to Production Web App
        run: echo "Production app not yet created. Promotion successful."